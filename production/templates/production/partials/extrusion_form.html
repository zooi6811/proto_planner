<div class="panel">
    <div class="panel-header" style="border-bottom: 2px solid var(--border-soft); padding-bottom: 15px; margin-bottom: 20px;">
        <h2 style="margin: 0;">Extrusion Department</h2>
    </div>
    
    <div style="background: var(--surface-alt); border: 2px solid var(--action-blue); border-radius: var(--radius); padding: 20px; margin-bottom: 20px;">
        <h3 style="margin-top: 0; color: var(--action-blue); font-size: 1rem; margin-bottom: 15px;">STEP 1: TERMINAL SETUP</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label class="input-label">Machine No</label>
                <select id="extrusion-machine-select" name="machine_no" required style="width: 100%; font-weight: bold; border-color: var(--action-blue);">
                    <option value="" disabled selected>-- Select Machine --</option>
                    
                    {% for i in "123456789" %}
                        {% with machine="B"|add:i %}
                        <option value="{{ machine }}" {% if machine in active_machines %}style="color: var(--status-green); font-weight: bold;"{% endif %}>
                            {{ machine }} {% if machine in active_machines %}🟢 (ACTIVE){% endif %}
                        </option>
                        {% endwith %}
                    {% endfor %}
                    
                </select>
            </div>
            <div>
                <label class="input-label">Shift</label>
                <select id="extrusion-shift-select" name="shift" required style="width: 100%; font-weight: bold; border-color: var(--action-blue);">
                    <option value="" disabled selected>-- Select Shift --</option>
                    <option value="AM">AM SHIFT</option>
                    <option value="PM">PM SHIFT</option>
                </select>
            </div>
        </div>
    </div>

    <div id="extrusion-waiting-state" style="background: var(--surface-alt); border: 2px dashed var(--border-soft); border-radius: var(--radius); padding: 40px 20px; text-align: center; margin-bottom: 20px;">
        <div style="font-size: 2.5rem; margin-bottom: 15px; opacity: 0.5;">🏭</div>
        <p style="color: var(--text-muted); font-weight: bold; text-transform: uppercase; margin: 0; font-size: 1.1rem;">Awaiting Terminal Setup</p>
        <p style="font-size: 0.9rem; color: var(--border-hard); margin-top: 8px;">Please select your Machine and Shift above to connect to the terminal.</p>
    </div>

    <div id="extrusion-workspace" style="display: none;">
        
        <button id="trigger-machine-load" 
                hx-get="/load-machine-state/" 
                hx-target="#machine-workspace" 
                hx-include="#extrusion-machine-select" 
                style="display: none;"></button>
        
        <div id="machine-workspace"></div>
    </div>
</div>

<script>
    (function() {
        var machineSelect = document.getElementById('extrusion-machine-select');
        var shiftSelect = document.getElementById('extrusion-shift-select');
        var workspace = document.getElementById('extrusion-workspace');
        var waitingState = document.getElementById('extrusion-waiting-state');
        var triggerBtn = document.getElementById('trigger-machine-load');

        // 1. Restore previous terminal setup from the browser's local storage
        if (localStorage.getItem('terminal_machine')) {
            machineSelect.value = localStorage.getItem('terminal_machine');
        }
        if (localStorage.getItem('terminal_shift')) {
            shiftSelect.value = localStorage.getItem('terminal_shift');
        }

        function checkSetup() {
            if (machineSelect.value && shiftSelect.value) {
                // 2. Save the current setup so it survives browser refreshes
                localStorage.setItem('terminal_machine', machineSelect.value);
                localStorage.setItem('terminal_shift', shiftSelect.value);

                // Unlock UI
                waitingState.style.display = 'none';
                workspace.style.display = 'block';
                
                // 3. THE FIX: Delay the HTMX trigger slightly. 
                // Inline scripts run before HTMX has finished wiring up the new HTML. 
                // This tiny 50ms timeout guarantees the button is "alive" before we trigger it.
                setTimeout(function() {
                    if (typeof htmx !== 'undefined') {
                        htmx.trigger(triggerBtn, 'click');
                    }
                }, 50);

            } else {
                // Lock UI
                waitingState.style.display = 'block';
                workspace.style.display = 'none';
            }
        }

        if (machineSelect && shiftSelect) {
            machineSelect.addEventListener('change', checkSetup);
            shiftSelect.addEventListener('change', checkSetup);
            
            // Fire the initial check with a delay to completely bypass page-load race conditions
            setTimeout(checkSetup, 50); 
        }
    })();
</script>
