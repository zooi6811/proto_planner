<form hx-post="/submit-extrusion/" hx-target="#feedback-container" hx-swap="innerHTML" class="dashboard-grid">
    {% csrf_token %}
    
    <div class="panel">
        <div class="panel-title">1. Extrusion Setup</div>
        <label class="input-label">Select Machine</label>
        <div class="radio-group">
            <input type="radio" name="machine" id="m-b1" value="B1" class="radio-btn" required>
            <label for="m-b1" class="radio-label">Machine B1</label>
            <input type="radio" name="machine" id="m-b6" value="B6" class="radio-btn">
            <label for="m-b6" class="radio-label">Machine B6</label>
        </div>
        <label class="input-label">Select Shift</label>
        <div class="radio-group">
            <input type="radio" name="shift" id="s-am" value="AM" class="radio-btn" required>
            <label for="s-am" class="radio-label">AM Shift</label>
            <input type="radio" name="shift" id="s-pm" value="PM" class="radio-btn">
            <label for="s-pm" class="radio-label">PM Shift</label>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">2. Active Job Order</div>
        
        <div style="margin-bottom: 15px; position: relative;">
            <input type="search" name="q" placeholder="🔍 Search JO or Customer..." 
                   hx-get="/search-jobs/?dept=extrusion" 
                   hx-trigger="keyup changed delay:400ms, search" 
                   hx-target="#job-list-results"
                   onkeydown="if(event.key === 'Enter') { event.preventDefault(); return false; }"
                   style="width: 100%; padding: 12px 12px 12px 35px; font-size: 1.1rem; border: 2px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
        </div>

        <div id="job-list-results" class="radio-group" style="overflow-y: auto; flex-grow: 1; max-height: 500px; padding-right: 10px;">
            {% include 'production/partials/job_radio_list.html' %}
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">3. Production Details</div>
        
        <div id="digital-spec-container">
            <div style="padding: 15px; border: 2px dashed #cbd5e1; text-align: center; color: #64748b; border-radius: 8px; margin-bottom: 20px; font-weight: bold;">
                Select a Job Order to view production instructions.
            </div>
        </div>

        <div class="input-group">
            <label>Roll Weight (KG)</label>
            <input type="number" step="0.01" min="0.01" max="500" name="roll_weight" required placeholder="0.00">
        </div>
        <div class="input-group">
            <label>Wastage (KG)</label>
            <input type="number" step="0.01" min="0" name="wastage" value="0" placeholder="0.00">
        </div>
        <div id="feedback-container">Awaiting input...</div>
        <button type="submit" class="btn-submit">Submit Extrusion Log</button>
    </div>
</form>
