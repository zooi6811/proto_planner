<div class="panel">
    <div class="panel-header">
        <h2>Extrusion Department</h2>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
        <div>
            <label class="input-label">Machine Number</label>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0;">Select a machine to view its current state or initialise a new run.</p>
            
            <select name="machine_no" hx-get="/load-machine-state/" hx-target="#machine-workspace" hx-trigger="change">
                <option value="" disabled selected>-- Select Machine --</option>
                <option value="B1">B1</option>
                <option value="B2">B2</option>
                <option value="B3">B3</option>
                <option value="B4">B4</option>
                <option value="B5">B5</option>
                <option value="B6">B6</option>
                <option value="B7">B7</option>
                <option value="B8">B8</option>
                <option value="B9">B9</option>
            </select>
        </div>

        <div id="machine-workspace" style="background: var(--surface-alt); border: 2px dashed var(--border-soft); border-radius: var(--radius); padding: 20px; display: flex; align-items: center; justify-content: center;">
            <p style="color: var(--text-muted); font-weight: bold; text-transform: uppercase;">Awaiting Machine Selection...</p>
        </div>
    </div>
</div>
