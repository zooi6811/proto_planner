<div class="dashboard-grid" style="grid-template-columns: 1fr 2.5fr;">
    <div class="panel">
        <div class="panel-title">1. Select Machine</div>
        <div class="radio-group">
            <button class="radio-label" style="width: 100%; border: none; margin-bottom: 10px;" 
                    hx-get="/load-machine-state/B1/" hx-target="#machine-workspace">Machine B1</button>
            <button class="radio-label" style="width: 100%; border: none; margin-bottom: 10px;" 
                    hx-get="/load-machine-state/B6/" hx-target="#machine-workspace">Machine B6</button>
        </div>
    </div>

    <div id="machine-workspace" class="panel" style="background-color: #f8fafc; align-items: center; justify-content: center;">
        <h3 style="color: #94a3b8;">Select a machine to view or start a session.</h3>
    </div>
</div>

    <div class="panel">
        <div class="panel-title">3. Production Details</div>
        
        <div id="digital-spec-container">
            <div style="padding: 15px; border: 2px dashed #cbd5e1; text-align: center; color: #64748b; border-radius: 8px; margin-bottom: 20px; font-weight: bold;">
                Select a Job Order to view production instructions.
            </div>
        </div>

        <div class="input-group">
            <label>Roll Weight (KG)</label>
            <input type="number" step="0.01" min="0.01" max="500" name="roll_weight" required placeholder="0.00">
        </div>
        <div class="input-group">
            <label>Wastage (KG)</label>
            <input type="number" step="0.01" min="0" name="wastage" value="0" placeholder="0.00">
        </div>
        <div id="feedback-container">Awaiting input...</div>
        <button type="submit" class="btn-submit">Submit Extrusion Log</button>
    </div>
</form>
