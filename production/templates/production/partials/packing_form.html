<div class="panel">
    <div class="panel-header">
        <h2>Packing & Dispatch Log</h2>
    </div>
    
    <form hx-post="/submit-packing/" hx-target="#feedback-container">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px;">
            
            <div style="border-right: 2px solid var(--border-soft); padding-right: 30px;">
                <label class="input-label">Select Active Job</label>
                <input type="text" name="q" placeholder="Search JO or Customer..." 
                       hx-get="/search-jobs/?dept=packing" 
                       hx-target="#packing-jo-list" 
                       hx-trigger="keyup changed delay:300ms"
                       style="margin-bottom: 15px; width: 100%;">
                
                <div id="packing-jo-list">
                    {% include 'production/partials/job_radio_list.html' %}
                </div>
            </div>

            <div>
                <div id="job-specs-container">
                    <div style="padding: 20px; border: 2px dashed var(--border-soft); border-radius: var(--radius); text-align: center; color: var(--text-muted); margin-bottom: 20px; font-weight: bold;">
                        Select a Job Order to view technical specifications.
                    </div>
                </div>

                <div id="active-progress-bar" style="margin-bottom: 20px;"></div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label class="input-label">Packing Size (KG per unit)</label>
                        <input type="number" name="packing_size" step="0.01" min="0.01" required class="text-mono" style="width: 100%;">
                    </div>
                    <div>
                        <label class="input-label">Quantity (Bags/Boxes)</label>
                        <input type="number" name="quantity" step="1" min="1" required class="text-mono" style="width: 100%;">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 20px; width: 100%; padding: 12px; font-weight: bold;">SUBMIT PACKING LOG</button>
                
                <div id="feedback-container" style="margin-top: 20px;"></div>
            </div>
        </div>
    </form>
</div>
