<div class="panel">
    <div class="panel-header">
        <h2>Cutting & Slitting Log</h2>
    </div>
    
    <form hx-post="/submit-cutting/" hx-target="#feedback-container" hx-disabled-elt="#cutting-submit-btn">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px;">
            
            <div style="border-right: 2px solid var(--border-soft); padding-right: 30px;">
                <label class="input-label">Select Active Job</label>
                <input type="text" name="q" placeholder="Search JO or Customer..." 
                       hx-get="/search-jobs/?dept=cutting" 
                       hx-target="#cutting-jo-list" 
                       hx-trigger="keyup changed delay:300ms"
                       style="margin-bottom: 15px; width: 100%;">
                
                <div id="cutting-jo-list">
                    {% include 'production/partials/job_radio_list.html' %}
                </div>
            </div>

            <div>
                <div id="job-specs-container">
                    <div style="padding: 20px; border: 2px dashed var(--border-soft); border-radius: var(--radius); text-align: center; color: var(--text-muted); margin-bottom: 20px; font-weight: bold;">
                        Select a Job Order to view technical specifications.
                    </div>
                </div>

                <div id="active-progress-bar" style="margin-bottom: 20px;"></div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label class="input-label">Machine No</label>
                        <input type="text" name="machine" placeholder="e.g. CUT-01" required style="width: 100%;">
                    </div>
                    <div>
                        <label class="input-label">Shift</label>
                        <select name="shift" required style="width: 100%;">
                            <option value="AM">AM SHIFT</option>
                            <option value="PM">PM SHIFT</option>
                        </select>
                    </div>
                    <div>
                        <label class="input-label">Output (KG)</label>
                        <input type="number" name="output_kg" step="0.01" min="0.01" required class="text-mono" style="width: 100%;">
                    </div>
                    <div>
                        <label class="input-label">Wastage (KG)</label>
                        <input type="number" name="wastage" step="0.01" min="0" placeholder="0" class="text-mono" style="width: 100%;">
                    </div>
                </div>
                
                <button id="cutting-submit-btn" type="submit" class="btn btn-primary" style="margin-top: 20px; width: 100%; padding: 12px; font-weight: bold;">SUBMIT</button>
                
                <div id="feedback-container" style="margin-top: 20px;"></div>
            </div>
        </div>
    </form>
</div>
