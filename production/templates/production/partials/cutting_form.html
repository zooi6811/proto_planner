<div class="panel">
    <div class="panel-header" style="border-bottom: 2px solid var(--border-soft); padding-bottom: 15px; margin-bottom: 20px;">
        <h2 style="margin: 0;">Cutting Department</h2>
    </div>
    
    <div style="background: var(--surface-alt); border: 2px solid var(--action-blue); border-radius: var(--radius); padding: 20px; margin-bottom: 20px;">
        <h3 style="margin-top: 0; color: var(--action-blue); font-size: 1rem; margin-bottom: 15px;">STEP 1: TERMINAL SETUP</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label class="input-label">Machine No</label>
                <select id="cutting-machine-select" name="machine_no" required style="width: 100%; font-weight: bold; border-color: var(--action-blue);">
                    <option value="" disabled selected>-- Select Machine --</option>
                    {% for i in '123456789'|make_list %}
                        <option value="C{{ i }}" {% if 'C'|add:i in active_machines %}style="color: var(--status-green); font-weight: bold;"{% endif %}>
                            C{{ i }} {% if 'C'|add:i in active_machines %}🟢 (ACTIVE){% endif %}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="input-label">Shift</label>
                <select id="cutting-shift-select" name="shift" required style="width: 100%; font-weight: bold; border-color: var(--action-blue);">
                    <option value="" disabled selected>-- Select Shift --</option>
                    <option value="AM">AM SHIFT</option>
                    <option value="PM">PM SHIFT</option>
                </select>
            </div>
        </div>
    </div>

    <div id="cutting-waiting-state" style="background: var(--surface-alt); border: 2px dashed var(--border-soft); border-radius: var(--radius); padding: 40px 20px; text-align: center; margin-bottom: 20px;">
        <div style="font-size: 2.5rem; margin-bottom: 15px; opacity: 0.5;">✂️</div>
        <p style="color: var(--text-muted); font-weight: bold; text-transform: uppercase; margin: 0; font-size: 1.1rem;">Awaiting Terminal Setup</p>
        <p style="font-size: 0.9rem; color: var(--border-hard); margin-top: 8px;">Please select your Machine and Shift above to connect to the terminal.</p>
    </div>

    <div id="cutting-workspace" style="display: none;">
        <button id="trigger-cutting-load" 
                hx-get="{% url 'load_cutting_state' %}" 
                hx-target="#cutting-workspace" 
                hx-include="#cutting-machine-select" 
                style="display: none;"></button>
    </div>
</div>

<script>
    (function() {
        var machineSelect = document.getElementById('cutting-machine-select');
        var shiftSelect = document.getElementById('cutting-shift-select');
        var workspace = document.getElementById('cutting-workspace');
        var waitingState = document.getElementById('cutting-waiting-state');
        var triggerBtn = document.getElementById('trigger-cutting-load');

        // Restore previous terminal setup
        if (localStorage.getItem('terminal_machine')) {
            machineSelect.value = localStorage.getItem('terminal_machine');
        }
        if (localStorage.getItem('terminal_shift')) {
            shiftSelect.value = localStorage.getItem('terminal_shift');
        }

        function checkSetup() {
            if (machineSelect.value && shiftSelect.value) {
                localStorage.setItem('terminal_machine', machineSelect.value);
                localStorage.setItem('terminal_shift', shiftSelect.value);

                waitingState.style.display = 'none';
                workspace.style.display = 'block';
                
                setTimeout(function() {
                    if (typeof htmx !== 'undefined') {
                        htmx.trigger(triggerBtn, 'click');
                    }
                }, 50);

            } else {
                waitingState.style.display = 'block';
                workspace.style.display = 'none';
            }
        }

        if (machineSelect && shiftSelect) {
            machineSelect.addEventListener('change', checkSetup);
            shiftSelect.addEventListener('change', checkSetup);
            
            // Fire the initial check with a delay to completely bypass page-load race conditions
            setTimeout(checkSetup, 50); 
        }
    })();
</script>
