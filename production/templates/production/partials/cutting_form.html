<form hx-post="/submit-cutting/" hx-target="#feedback-container" hx-swap="innerHTML" class="dashboard-grid">
    {% csrf_token %}
    
    <div class="panel" style="border-top: 4px solid #9b59b6;">
        <div class="panel-title" style="color: #9b59b6;">1. Cutting Setup</div>
        <label class="input-label">Select Machine</label>
        <div class="radio-group">
            <input type="radio" name="machine" id="m-c6" value="C6" class="radio-btn" required>
            <label for="m-c6" class="radio-label">Machine C6</label>
            <input type="radio" name="machine" id="m-c7" value="C7" class="radio-btn">
            <label for="m-c7" class="radio-label">Machine C7</label>
        </div>
        <label class="input-label">Select Shift</label>
        <div class="radio-group">
            <input type="radio" name="shift" id="c-s-am" value="AM" class="radio-btn" required>
            <label for="c-s-am" class="radio-label">AM Shift</label>
            <input type="radio" name="shift" id="c-s-pm" value="PM" class="radio-btn">
            <label for="c-s-pm" class="radio-label">PM Shift</label>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title" style="color: #9b59b6;">2. Active Job Order</div>
        
        <div style="margin-bottom: 15px; position: relative;">
            <input type="search" name="q" placeholder="🔍 Search JO or Customer..." 
                   hx-get="/search-jobs/" 
                   hx-trigger="keyup changed delay:400ms, search" 
                   hx-target="#job-list-results"
                   style="width: 100%; padding: 12px 12px 12px 35px; font-size: 1.1rem; border: 2px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
        </div>

        <div id="job-list-results" class="radio-group" style="overflow-y: auto; flex-grow: 1; max-height: 500px; padding-right: 10px;">
            {% include 'production/partials/job_radio_list.html' %}
        </div>
    </div>

    <div class="panel">
        <div class="panel-title" style="color: #9b59b6;">3. Production Details</div>
        
        <div id="digital-spec-container">
            <div style="padding: 15px; border: 2px dashed #cbd5e1; text-align: center; color: #64748b; border-radius: 8px; margin-bottom: 20px; font-weight: bold;">
                Select a Job Order to view production instructions.
            </div>
        </div>

        <div class="input-group">
            <label>Output Processed (KG)</label>
            <input type="number" step="0.01" min="0.01" max="1000" name="output_kg" required placeholder="0.00">
        </div>
        <div class="input-group">
            <label>Cutting Wastage (KG)</label>
            <input type="number" step="0.01" min="0" name="wastage" value="0" placeholder="0.00">
        </div>
        <div id="feedback-container">Awaiting input...</div>
        <button type="submit" class="btn-submit" style="background-color: #9b59b6;">Submit Cutting Log</button>
    </div>
</form>
