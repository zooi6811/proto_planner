<div style="border: 2px solid var(--status-green); padding: 20px; border-radius: var(--radius); background: var(--surface);">
    <div class="panel-header" style="border-bottom-color: var(--status-green);">
        <h2 style="color: var(--status-green); display: flex; align-items: center; gap: 10px;">
            <div class="status-dot status-live"></div> ACTIVE RUN: MACHINE {{ session.machine_no }}
        </h2>
        <span style="font-weight: bold; color: var(--text-muted);">SHIFT: {{ session.shift }}</span>
    </div>

    <div style="margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
            <p class="input-label">Job Order</p>
            <div style="font-size: 1.2rem; font-weight: bold;">{{ session.job_order.jo_number }}</div>
            <div style="color: var(--text-muted);">{{ session.job_order.customer }}</div>
        </div>
        <div style="text-align: right;">
            <p class="input-label">Output Progress</p>
            <div style="font-size: 1.2rem; font-weight: bold;" class="text-mono">
                {{ session.total_output_kg }} / {{ session.target_amount_kg }} KG
            </div>
        </div>
    </div>

    <form hx-post="/log-session-roll/" hx-target="#machine-workspace" style="background: var(--bg-floor); padding: 15px; border-radius: var(--radius); margin-bottom: 20px;">
        {% csrf_token %}
        <input type="hidden" name="session_id" value="{{ session.id }}">
        <h3 style="margin-bottom: 15px; font-size: 1rem; color: var(--text-muted);">LOG NEW ROLL</h3>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label class="input-label">Roll Weight (KG)</label>
                <input type="number" name="roll_weight" step="0.01" min="0.01" required class="text-mono">
            </div>
            <div>
                <label class="input-label">Wastage (KG)</label>
                <input type="number" name="wastage" step="0.01" min="0" value="0" class="text-mono">
            </div>
        </div>
        <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 15px;">SUBMIT ROLL</button>
    </form>

    <div style="text-align: right;">
        <button hx-post="/stop-session/{{ session.id }}/" hx-target="#machine-workspace" class="btn" style="background-color: var(--status-red); color: white; font-size: 0.9rem; padding: 10px 15px;">
            TERMINATE SESSION EARLY
        </button>
    </div>
</div>
