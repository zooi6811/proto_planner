{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Gateway | Proto-Planner ERP</title>
    <link rel="stylesheet" href="{% static 'css/industrial.css' %}?v=2">
    <style>
        body { background-color: var(--brand-dark); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { width: 100%; max-width: 900px; background: var(--surface); border-radius: 8px; border-top: 6px solid var(--action-blue); }
        .login-header { text-align: center; padding: 30px; background: var(--surface-alt); border-bottom: 2px solid var(--border-soft); }
        .login-header h1 { color: var(--brand-dark); font-size: 2rem; margin: 0; }
        #choice-screen { display: grid; grid-template-columns: 1fr 1fr; padding: 40px; gap: 30px; }
        .choice-card { border: 2px dashed var(--border-hard); border-radius: var(--radius); padding: 50px 20px; text-align: center; cursor: pointer; background: var(--surface-alt); }
        .choice-card:hover { border-color: var(--action-blue); background: rgba(2, 132, 199, 0.05); }
        .form-screen { display: none; padding: 40px; max-width: 500px; margin: 0 auto; }
        .pin-display { width: 100%; text-align: center; font-size: 2.5rem; letter-spacing: 15px; padding: 20px; border: 2px solid var(--border-hard); background: var(--surface-alt); margin-bottom: 20px; font-family: var(--font-mono); }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .pin-btn { padding: 20px; font-size: 1.8rem; font-weight: bold; background: var(--surface-alt); border: 2px solid var(--border-soft); cursor: pointer; color: var(--brand-dark); }
        .pin-btn-action { background: var(--action-blue); color: white; }
        .pin-btn-clear { background: var(--status-red); color: white; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Proto-Planner <span style="color: var(--action-blue);">ERP</span></h1>
            <p style="color: var(--text-muted); text-transform: uppercase;">Authorisation Gateway</p>
        </div>

        {% if messages %}
            <div style="padding: 0 40px; margin-top: 20px;">
                {% for message in messages %}
                    <div style="background: #fee2e2; color: #991b1b; padding: 15px; border-left: 4px solid var(--status-red);">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <div id="choice-screen">
            <div class="choice-card" onclick="showForm('operator')">
                <div style="font-size: 4rem;">🏭</div>
                <h2 style="color: var(--brand-dark);">Operator Terminal</h2>
            </div>
            
            <div class="choice-card" onclick="showForm('staff')">
                <div style="font-size: 4rem;">📊</div>
                <h2 style="color: var(--brand-dark);">Control Tower</h2>
            </div>

            <div style="grid-column: 1 / -1; text-align: center; margin-top: 10px; padding-top: 30px; border-top: 1px dashed var(--border-soft);">
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; text-transform: uppercase;">New Personnel?</p>
                <a href="{% url 'register_user' %}" class="btn" style="background: transparent; border: 2px solid var(--action-blue); color: var(--action-blue); padding: 10px 20px; font-size: 0.9rem; display: inline-block;">
                    Register System Access
                </a>
            </div>
            
        </div>

        

        

        <div id="form-operator" class="form-screen">
            <button onclick="showChoice()" style="background: none; border: none; cursor: pointer; color: var(--text-muted); margin-bottom: 20px;">← Back</button>
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="hidden" name="login_type" value="operator">
                <input type="password" id="hidden-pin" name="pin_code" required style="display: none;">
                <div class="pin-display" id="visual-pin">----</div>
                <div class="pin-grid">
                    <button type="button" class="pin-btn" onclick="appendPin(1)">1</button>
                    <button type="button" class="pin-btn" onclick="appendPin(2)">2</button>
                    <button type="button" class="pin-btn" onclick="appendPin(3)">3</button>
                    <button type="button" class="pin-btn" onclick="appendPin(4)">4</button>
                    <button type="button" class="pin-btn" onclick="appendPin(5)">5</button>
                    <button type="button" class="pin-btn" onclick="appendPin(6)">6</button>
                    <button type="button" class="pin-btn" onclick="appendPin(7)">7</button>
                    <button type="button" class="pin-btn" onclick="appendPin(8)">8</button>
                    <button type="button" class="pin-btn" onclick="appendPin(9)">9</button>
                    <button type="button" class="pin-btn pin-btn-clear" onclick="clearPin()">CLR</button>
                    <button type="button" class="pin-btn" onclick="appendPin(0)">0</button>
                    <button type="submit" class="pin-btn pin-btn-action">ENT</button>
                </div>
            </form>
        </div>

        <div id="form-staff" class="form-screen">
            <button onclick="showChoice()" style="background: none; border: none; cursor: pointer; color: var(--text-muted); margin-bottom: 20px;">← Back</button>
            <form method="POST" action="{% url 'login' %}" style="display: flex; flex-direction: column; gap: 15px;">
                {% csrf_token %}
                <input type="hidden" name="login_type" value="staff">
                <label class="input-label">Username</label>
                <input type="text" name="username" required style="padding: 12px; font-size: 1.2rem; border: 2px solid var(--border-hard);">
                <label class="input-label">Password</label>
                <input type="password" name="password" required style="padding: 12px; font-size: 1.2rem; border: 2px solid var(--border-hard);">
                <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Log In</button>
            </form>
        </div>
    </div>

    <script>
        let currentPin = "";
        function showForm(type) {
            document.getElementById('choice-screen').style.display = 'none';
            document.getElementById('form-' + type).style.display = 'block';
        }
        function showChoice() {
            document.getElementById('form-operator').style.display = 'none';
            document.getElementById('form-staff').style.display = 'none';
            document.getElementById('choice-screen').style.display = 'grid';
            clearPin();
        }
        function appendPin(num) {
            if (currentPin.length < 4) { currentPin += num; updatePinDisplay(); }
        }
        function clearPin() { currentPin = ""; updatePinDisplay(); }
        function updatePinDisplay() {
            document.getElementById('hidden-pin').value = currentPin;
            document.getElementById('visual-pin').innerText = currentPin.padEnd(4, '-').split('').map(c => c !== '-' ? '*' : '-').join('');
        }
    </script>
</body>
</html>
