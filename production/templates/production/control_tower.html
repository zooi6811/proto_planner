<!DOCTYPE html>
<html lang="en">
<head>
    <title>Live Production Status</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/django-htmx.js"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/ws.js"></script>
    <link rel="stylesheet" href="/static/css/industrial.css">
    <style>
        .header { 
            background: var(--brand-dark); padding: 20px; border-radius: var(--radius);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }
        .header h1 { color: #ffffff; font-size: 1.8rem; margin: 0; }
        .live-tag { color: var(--border-soft); font-family: var(--font-mono); font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body hx-ext="django-htmx">
    <div id="ws-bridge"></div>
    <nav class="top-nav">
        <div class="nav-brand">
            PROTO-PLANNER <span style="color: var(--action-blue);">ERP</span>
        </div>
        <div class="nav-links">
            <a href="/" >Production Terminal</a>
            <a href="/control-tower/" class="active">Production Status</a>
            {% if request.user.is_staff %}
                <a href="/admin/" target="_blank" style="color: #ff9800;">Admin Panel ↗</a>
            {% endif %}
        </div>
        <div class="nav-user">
            <span>OPERATOR: <strong>{{ request.user.username|default:"GUEST"|upper }}</strong></span>
            
            <form method="post" action="{% url 'logout' %}" style="margin: 0; display: inline-block;">
                {% csrf_token %}
                <button type="submit" class="btn-logout" style="cursor: pointer; font-family: var(--font-sans);">END SHIFT</button>
            </form>
        </div>
    </nav>  

    <div class="header">
        <h1>Live Production Status</h1>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="status-dot status-live"></div>
            <span class="live-tag">SYSTEM ONLINE // SYNCING</span>
        </div>
    </div>

    <div id="tower-container" 
         hx-get="/control-tower/" 
         hx-trigger="load, every 10s" 
         hx-swap="innerHTML" 
         hx-include=".tower-state">
        
        <div style="text-align: center; padding: 50px; color: var(--border-hard); font-family: var(--font-mono);">
            > ESTABLISHING CONNECTION TO FLOOR TERMINALS...
        </div>
    </div>
    
    <script>
        // Initialise the WebSocket connection
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const factorySocket = new WebSocket(
            protocol + window.location.host + '/ws/live/'
        );

        factorySocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            
            // When the server broadcasts an update, we convert it into a DOM event.
            // HTMX components listening for 'softRefresh' on the body will automatically reload.
            if (data.type === 'softRefresh') {
                console.log("Real-time update received. Refreshing UI...");
                document.body.dispatchEvent(new Event('softRefresh'));
            }
        };

        factorySocket.onclose = function(e) {
            console.error('Factory socket closed unexpectedly');
            // In a production environment, you would implement exponential backoff reconnection here.
        };
    </script>
    <script>
    // Listen for WebSocket messages coming through HTMX
    document.body.addEventListener("htmx:wsAfterMessage", function(event) {
        try {
            // Parse the incoming WebSocket data
            const data = JSON.parse(event.detail.message);
            
            // If it's our new supervisor alert...
            if (data.type === "supervisor_alert") {
                
                // Fire a loud browser alert (or hook this into a SweetAlert/Modal if you prefer)
                alert(
                    "ACTION REQUIRED\n\n" +
                    "Job Order: " + data.jo_number + "\n" + 
                    "Status: " + data.variance_type + "\n\n" +
                    data.message
                );
                
                // Optional: Auto-refresh the page so the supervisor immediately sees the pending job
                window.location.reload();
            }
        } catch (e) {
            // Ignore non-JSON messages (like HTML fragments being swapped by HTMX)
        }
    });
</script>
</body>
</html>
