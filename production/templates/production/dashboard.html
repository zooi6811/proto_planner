{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Production Terminal</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{% static 'css/industrial.css' %}">
    <style>
        /* Specific layout for the terminal */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 15px; font-size: 1.2rem; font-weight: bold; text-transform: uppercase;
            background-color: var(--border-soft); color: var(--text-muted); 
            border: 2px solid var(--border-hard); border-bottom: none; border-radius: var(--radius) var(--radius) 0 0;
            cursor: pointer; transition: 0.2s;
        }
        .tab-btn.active { 
            background-color: var(--surface); color: var(--action-blue); 
            border-bottom: 4px solid var(--action-blue); 
        }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 20px; height: calc(100vh - 120px); }
    </style>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    <div class="nav-tabs" id="tab-container">
        <button class="tab-btn active" hx-get="/get-extrusion/" hx-target="#form-workspace" hx-swap="innerHTML" onclick="setActiveTab(this)">Extrusion Log</button>
        <button class="tab-btn" hx-get="/get-cutting/" hx-target="#form-workspace" hx-swap="innerHTML" onclick="setActiveTab(this)">Cutting Log</button>
        <button class="tab-btn" hx-get="/get-packing/" hx-target="#form-workspace" hx-swap="innerHTML" onclick="setActiveTab(this)">Packing Log</button>
    </div>

    <div id="form-workspace">
        {% include 'production/partials/extrusion_form.html' %}
    </div>

    <script>
        function setActiveTab(clickedBtn) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            clickedBtn.classList.add('active');
        }
    </script>
</body>
</html>
